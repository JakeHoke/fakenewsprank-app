<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FakeNewsPrank</title>
  <link rel="stylesheet" href="./css/styles.css" />

  <!-- Google Identity Services — renders the official "Sign in with Google" button -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- Loading overlay — shown until redirectIfAuthenticated resolves -->
  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- Auth card — hidden until loading resolves -->
  <div id="app-content" style="display:none;">
    <div class="page-center">
      <div class="auth-card">

        <div class="auth-logo">
          <span class="logo-icon">📰</span>
          <div class="logo-title">FakeNewsPrank</div>
          <div class="logo-sub">app.fakenewsprank.com</div>
        </div>

        <p class="auth-signin-label">Sign in to continue</p>

        <!-- Error alert -->
        <div id="error-alert" class="alert alert-error" role="alert"></div>

        <!--
          Google GSI rendered button.
          data-client_id  — your Google OAuth client ID (same as Firebase authDomain project).
          data-callback   — global function called with the GSI credential response.
          data-width      — matches the card width so the button fills the column.
        -->
        <div
          id="g_id_onload"
          data-client_id="197846073131-REPLACE_WITH_OAUTH_CLIENT_ID.apps.googleusercontent.com"
          data-callback="handleGoogleSignIn"
          data-auto_prompt="false"
        ></div>

        <div
          class="g_id_signin"
          data-type="standard"
          data-shape="rectangular"
          data-theme="outline"
          data-text="signin_with"
          data-size="large"
          data-logo_alignment="left"
          data-width="340"
        ></div>

      </div>
    </div>
  </div>

  <script type="module">
    import { redirectIfAuthenticated, mapAuthError } from "./js/auth.js";
    import { auth } from "./js/firebase.js";
    import {
      GoogleAuthProvider,
      signInWithCredential,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loading    = document.getElementById("app-loading");
    const content    = document.getElementById("app-content");
    const errorAlert = document.getElementById("error-alert");

    // ── Helpers ───────────────────────────────────────────────
    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add("visible");
      console.warn("[login.html] Auth error:", msg);
    }

    // ── Auth gate — redirect if already signed in ─────────────
    console.log("[login.html] Checking for existing session…");
    await redirectIfAuthenticated();

    loading.style.display = "none";
    content.style.display = "";

    // ── GSI callback — called by Google after the user picks an account ──
    // Must be on window so the GSI script can invoke it.
    window.handleGoogleSignIn = async (googleResponse) => {
      console.log("[login.html] GSI credential received, signing into Firebase…");

      try {
        // Exchange the GSI ID token for a Firebase credential
        const firebaseCredential = GoogleAuthProvider.credential(googleResponse.credential);
        const result = await signInWithCredential(auth, firebaseCredential);
        console.log("[login.html] Firebase sign-in successful:", result.user.email);
        window.location.replace("/dashboard.html");
      } catch (err) {
        console.error("[login.html] Firebase sign-in error:", err.code, err.message);
        showError(mapAuthError(err.code));
      }
    };
  </script>

</body>
</html>
