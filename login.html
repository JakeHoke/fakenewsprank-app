<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FakeNewsPrank</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <!-- Loading overlay — shown until redirectIfAuthenticated resolves -->
  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- Auth card — hidden until loading resolves -->
  <div id="app-content" style="display:none;">
    <div class="page-center">
      <div class="auth-card">

        <div class="auth-logo">
          <span class="logo-icon">📰</span>
          <div class="logo-title">FakeNewsPrank</div>
          <div class="logo-sub">app.fakenewsprank.com</div>
        </div>

        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue.</p>

        <!-- Error alert -->
        <div id="error-alert" class="alert alert-error" role="alert"></div>

        <!-- Google OAuth button -->
        <button id="google-btn" class="btn-google">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

      </div>
    </div>
  </div>

  <script type="module">
    import { redirectIfAuthenticated, mapAuthError } from "./js/auth.js";
    import { auth } from "./js/firebase.js";
    import {
      GoogleAuthProvider,
      signInWithPopup,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loading    = document.getElementById("app-loading");
    const content    = document.getElementById("app-content");
    const googleBtn  = document.getElementById("google-btn");
    const errorAlert = document.getElementById("error-alert");

    // ── Helpers ───────────────────────────────────────────────
    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add("visible");
      console.warn("[login.html] Auth error:", msg);
    }

    function clearError() {
      errorAlert.textContent = "";
      errorAlert.classList.remove("visible");
    }

    function setLoading(isLoading) {
      googleBtn.disabled = isLoading;
      googleBtn.textContent = isLoading ? "Signing in…" : "Continue with Google";
    }

    // ── Auth gate — redirect if already signed in ─────────────
    console.log("[login.html] Checking for existing session…");
    await redirectIfAuthenticated();

    loading.style.display = "none";
    content.style.display = "";

    // ── Google sign-in ────────────────────────────────────────
    const provider = new GoogleAuthProvider();

    googleBtn.addEventListener("click", async () => {
      clearError();
      setLoading(true);
      console.log("[login.html] Starting Google sign-in popup…");

      try {
        const credential = await signInWithPopup(auth, provider);
        console.log("[login.html] Google sign-in successful:", credential.user.email);
        window.location.replace("/dashboard.html");
      } catch (err) {
        console.error("[login.html] Google sign-in error:", err.code, err.message);
        // User closing the popup is not a real error — silently reset
        if (err.code !== "auth/popup-closed-by-user" && err.code !== "auth/cancelled-popup-request") {
          showError(mapAuthError(err.code));
        }
        setLoading(false);
      }
    });
  </script>

</body>
</html>
