<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FakeNewsPrank</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <!-- Loading overlay — shown until redirectIfAuthenticated resolves -->
  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- Auth card — hidden until loading resolves -->
  <div id="app-content" style="display:none;">
    <div class="page-center">
      <div class="auth-card">

        <div class="auth-logo">
          <span class="logo-icon">📰</span>
          <div class="logo-title">FakeNewsPrank</div>
          <div class="logo-sub">app.fakenewsprank.com</div>
        </div>

        <p class="auth-signin-label">Sign in to continue</p>

        <!-- Error alert -->
        <div id="error-alert" class="alert alert-error" role="alert"></div>

        <!-- Email/Password Form -->
        <form id="email-form" style="display:flex; flex-direction:column; gap:1rem; margin-bottom:1.5rem;">
          <input type="email" id="email-input" placeholder="Email address" required class="form-input" style="padding:0.8rem; border:1px solid #ddd; border-radius:4px; font-size:1rem;" />
          <input type="password" id="password-input" placeholder="Password" required class="form-input" style="padding:0.8rem; border:1px solid #ddd; border-radius:4px; font-size:1rem;" />
          <button type="submit" id="email-submit-btn" class="btn btn-primary" style="margin-top:0.5rem; padding:0.8rem;">Sign In</button>
        </form>

        <div style="text-align:center; margin-bottom:1.5rem; font-size:0.9rem; color:#666;">
          <span id="toggle-mode-text">Don't have an account?</span> 
          <a href="#" id="toggle-mode-btn" style="color:var(--primary); font-weight:600; text-decoration:none;">Sign Up</a>
        </div>

        <div style="display:flex; align-items:center; text-align:center; margin-bottom:1.5rem;">
          <div style="flex:1; border-bottom:1px solid #eee;"></div>
          <span style="padding:0 1rem; color:#999; font-size:0.8rem; text-transform:uppercase;">or</span>
          <div style="flex:1; border-bottom:1px solid #eee;"></div>
        </div>

        <!-- Google sign-in button -->
        <button id="google-signin-btn" class="btn-google">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

      </div>
    </div>
  </div>

  <script type="module">
    import { redirectIfAuthenticated, mapAuthError } from "./js/auth.js";
    import { auth } from "./js/firebase.js";
    import {
      GoogleAuthProvider,
      signInWithPopup,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loading    = document.getElementById("app-loading");
    const content    = document.getElementById("app-content");
    const googleBtn  = document.getElementById("google-signin-btn");
    const errorAlert = document.getElementById("error-alert");

    const emailForm      = document.getElementById("email-form");
    const emailInput     = document.getElementById("email-input");
    const passwordInput  = document.getElementById("password-input");
    const emailSubmitBtn = document.getElementById("email-submit-btn");
    const toggleModeBtn  = document.getElementById("toggle-mode-btn");
    const toggleModeText = document.getElementById("toggle-mode-text");
    const signinLabel    = document.querySelector(".auth-signin-label");

    let isSignUpMode = false;

    // ── Logging flag ──────────────────────────────────────────
    const LOG_ENABLED = true;
    function log(...args) {
      if (LOG_ENABLED) console.log("[login.html]", ...args);
    }

    // ── Helpers ───────────────────────────────────────────────
    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add("visible");
      log("Auth error:", msg);
    }

    function clearError() {
      errorAlert.textContent = "";
      errorAlert.classList.remove("visible");
    }

    function setLoading(isLoading) {
      googleBtn.disabled = isLoading;
      emailSubmitBtn.disabled = isLoading;
      emailInput.disabled = isLoading;
      passwordInput.disabled = isLoading;
      toggleModeBtn.style.pointerEvents = isLoading ? "none" : "auto";
      toggleModeBtn.style.opacity = isLoading ? "0.5" : "1";

      if (isLoading) {
        emailSubmitBtn.textContent = "Please wait…";
        googleBtn.textContent = "Signing in…";
      } else {
        emailSubmitBtn.textContent = isSignUpMode ? "Create Account" : "Sign In";
        googleBtn.innerHTML = `
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google`;
      }
    }

    // ── Toggle Mode ───────────────────────────────────────────
    toggleModeBtn.addEventListener("click", (e) => {
      e.preventDefault();
      isSignUpMode = !isSignUpMode;
      clearError();
      if (isSignUpMode) {
        signinLabel.textContent = "Create an account";
        emailSubmitBtn.textContent = "Create Account";
        toggleModeText.textContent = "Already have an account?";
        toggleModeBtn.textContent = "Sign In";
      } else {
        signinLabel.textContent = "Sign in to continue";
        emailSubmitBtn.textContent = "Sign In";
        toggleModeText.textContent = "Don't have an account?";
        toggleModeBtn.textContent = "Sign Up";
      }
    });

    // ── Email/Password auth ───────────────────────────────────
    emailForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) return;

      setLoading(true);
      log(`Email submit clicked in ${isSignUpMode ? 'signup' : 'signin'} mode`);

      try {
        let result;
        if (isSignUpMode) {
          result = await createUserWithEmailAndPassword(auth, email, password);
          log("Account created:", result.user.email);
        } else {
          result = await signInWithEmailAndPassword(auth, email, password);
          log("Sign-in successful:", result.user.email);
        }
        window.location.replace("/dashboard");
      } catch (err) {
        log("Email auth error:", err.code, err.message);
        showError(mapAuthError(err.code) || err.message);
        setLoading(false);
      }
    });

    // ── Auth gate — redirect if already signed in ─────────────
    log("Checking for existing session…");
    await redirectIfAuthenticated();

    loading.style.display = "none";
    content.style.display = "";

    // ── Google sign-in via popup ──────────────────────────────
    const provider = new GoogleAuthProvider();

    googleBtn.addEventListener("click", async () => {
      clearError();
      setLoading(true);
      log("Google sign-in clicked, opening popup…");

      try {
        const result = await signInWithPopup(auth, provider);
        log("Sign-in successful:", result.user.email);
        window.location.replace("/dashboard");
      } catch (err) {
        log("Sign-in error:", err.code, err.message);
        // Silently reset if the user just closed the popup
        if (err.code !== "auth/popup-closed-by-user" && err.code !== "auth/cancelled-popup-request") {
          showError(mapAuthError(err.code));
        }
        setLoading(false);
      }
    });
  </script>

</body>
</html>
