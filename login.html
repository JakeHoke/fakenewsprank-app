<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FakeNewsPrank</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <!-- Loading overlay — shown until redirectIfAuthenticated resolves -->
  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- Auth card — hidden until loading resolves -->
  <div id="app-content" style="display:none;">
    <div class="page-center">
      <div class="auth-card">

        <div class="auth-logo">
          <span class="logo-icon">📰</span>
          <div class="logo-title">FakeNewsPrank</div>
          <div class="logo-sub">app.fakenewsprank.com</div>
        </div>

        <h1>Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account to continue.</p>

        <!-- Error alert -->
        <div id="error-alert" class="alert alert-error" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit" id="submit-btn" class="btn btn-primary">
            Sign In
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account?
          <a href="/signup.html">Create one</a>
        </p>

      </div>
    </div>
  </div>

  <script type="module">
    import { redirectIfAuthenticated, mapAuthError } from "./js/auth.js";
    import { auth } from "./js/firebase.js";
    import {
      signInWithEmailAndPassword,
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const loading  = document.getElementById("app-loading");
    const content  = document.getElementById("app-content");
    const form     = document.getElementById("login-form");
    const emailEl  = document.getElementById("email");
    const passEl   = document.getElementById("password");
    const submitBtn = document.getElementById("submit-btn");
    const errorAlert = document.getElementById("error-alert");

    // ── Helpers ───────────────────────────────────────────────
    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add("visible");
      console.warn("[login.html] Auth error:", msg);
    }

    function clearError() {
      errorAlert.textContent = "";
      errorAlert.classList.remove("visible");
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Signing in…" : "Sign In";
    }

    // ── Auth gate — redirect if already signed in ─────────────
    console.log("[login.html] Checking for existing session…");
    await redirectIfAuthenticated();

    // Auth resolved, user is not signed in — show the form
    loading.style.display = "none";
    content.style.display = "";

    // ── Form submit ───────────────────────────────────────────
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const email    = emailEl.value.trim();
      const password = passEl.value;

      if (!email || !password) {
        showError("Please fill in all fields.");
        return;
      }

      setLoading(true);
      console.log("[login.html] Attempting sign-in for:", email);

      try {
        const credential = await signInWithEmailAndPassword(auth, email, password);
        console.log("[login.html] Sign-in successful:", credential.user.email);
        window.location.replace("/dashboard.html");
      } catch (err) {
        console.error("[login.html] Sign-in error:", err.code, err.message);
        showError(mapAuthError(err.code));
        setLoading(false);
      }
    });
  </script>

</body>
</html>
