<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Published Articles — FakeNewsPrank</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      border-bottom: 2px solid var(--border, #e5e7eb);
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      padding: 0.6rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 500;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      color: var(--text-muted, #6b7280);
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover  { color: var(--text, #111); }
    .tab-btn.active { color: var(--primary, #2563eb); border-bottom-color: var(--primary, #2563eb); }
    .tab-panel      { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- Protected content -->
  <div id="app-content" style="display:none;">

    <!-- Shell injects <header> here -->
    <div id="shell-header"></div>

    <main class="page-main">

      <h1 class="page-title">My Articles</h1>
      <p class="page-subtitle">View and manage articles you've published.</p>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="published">Published</button>
        <button class="tab-btn"        data-tab="restricted">Taken Down</button>
      </div>

      <!-- ── Published tab ─────────────────────────────────────────────── -->
      <div id="tab-published" class="tab-panel active">
        <div id="pub-loading" style="color:var(--text-muted);">Loading…</div>
        <div id="pub-empty"   style="display:none;">
          <div class="coming-soon">
            <span class="cs-icon">📭</span>
            <h2>No published articles yet</h2>
            <p>Head over to <a href="/create">Create</a> to write your first prank article.</p>
          </div>
        </div>
        <div id="pub-list" class="card-grid" style="display:none;"></div>
      </div>

      <!-- ── Taken Down tab ────────────────────────────────────────────── -->
      <div id="tab-restricted" class="tab-panel">
        <div id="res-loading" style="color:var(--text-muted);">Loading…</div>
        <div id="res-empty"   style="display:none;">
          <div class="coming-soon">
            <span class="cs-icon">✅</span>
            <h2>No taken-down articles</h2>
            <p>None of your articles have been restricted.</p>
          </div>
        </div>
        <div id="res-list" class="card-grid" style="display:none;"></div>
      </div>

    </main>
  </div>

  <script type="module">
    import { initShell } from "./js/app-shell.js";
    import { db }        from "./js/firebase.js";
    import {
      collection, query, where, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const LOG_ENABLED = true;
    function log(...args) {
      if (LOG_ENABLED) console.log("[published.html]", ...args);
    }

    log("Initializing protected page…");
    const user = await initShell();
    log("Page ready for:", user.email);

    // ── Tab switching ─────────────────────────────────────────────────────────
    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
        log("Tab switched to:", btn.dataset.tab);
      });
    });

    // ── Load articles by status ───────────────────────────────────────────────
    async function loadArticles(status, loadingId, emptyId, listId) {
      const loadingEl = document.getElementById(loadingId);
      const emptyEl   = document.getElementById(emptyId);
      const listEl    = document.getElementById(listId);

      try {
        const q = query(
          collection(db, "articles"),
          where("authorId", "==", user.uid),
          where("status",   "==", status),
          orderBy("createdAt", "desc")
        );

        const snap = await getDocs(q);
        log(`[${status}] articles fetched:`, snap.size);

        loadingEl.style.display = "none";

        if (snap.empty) {
          emptyEl.style.display = "block";
          return;
        }

        listEl.style.display = "";
        snap.forEach((docSnap) => {
          const data = docSnap.data();
          const id   = docSnap.id;

          const createdAt   = formatDate(data.createdAt);
          const lastUpdated = formatDate(data.lastUpdated);
          const publishedAt = formatDate(data.publishedAt);

          const preview = data.excerpt
            || (data.content ? data.content.slice(0, 100) + (data.content.length > 100 ? "…" : "") : "No preview available.");

          const statusBadge = status === "restricted"
            ? `<span style="font-size:0.75rem; background:#fee2e2; color:#b91c1c; padding:0.2rem 0.5rem; border-radius:999px;">Taken Down</span>`
            : `<span style="font-size:0.75rem; background:#dcfce7; color:#15803d; padding:0.2rem 0.5rem; border-radius:999px;">Published</span>`;

          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.25rem;">
              <span class="card-icon">📰</span>
              ${statusBadge}
            </div>
            <h3 style="margin-bottom:0.25rem;">${escapeHtml(data.title || "Untitled")}</h3>
            <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:0.1rem;">Created: ${createdAt}</p>
            <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:0.1rem;">Published: ${publishedAt}</p>
            <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:0.75rem;">Last updated: ${lastUpdated}</p>
            <p style="font-size:0.875rem; margin-bottom:1rem;">${escapeHtml(preview)}</p>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
              <a href="/article?id=${id}" class="btn btn-primary" style="width:auto; padding:0.4rem 0.9rem; font-size:0.85rem;">
                View
              </a>
            </div>
          `;
          listEl.appendChild(card);
        });

      } catch (err) {
        console.error(`[published.html] Failed to load ${status} articles:`, err);
        loadingEl.textContent = "Failed to load. Please try refreshing.";
      }
    }

    // ── Fetch both tabs in parallel ───────────────────────────────────────────
    await Promise.all([
      loadArticles("published",  "pub-loading", "pub-empty", "pub-list"),
      loadArticles("restricted", "res-loading", "res-empty", "res-list"),
    ]);

    // ── Utility: format Firestore timestamp → readable string ────────────────
    function formatDate(ts) {
      if (!ts?.toDate) return "—";
      return ts.toDate().toLocaleDateString(undefined, {
        year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    }

    // ── Utility: escape HTML to prevent XSS ──────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>

</body>
</html>
