<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — FakeNewsPrank</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <!-- Loading overlay -->
  <div id="app-loading">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <p>Loading…</p>
    </div>
  </div>

  <!-- Protected content -->
  <div id="app-content" style="display:none;">

    <!-- Shell injects <header> here -->
    <div id="shell-header"></div>

    <main class="page-main">

      <h1 class="page-title">Account</h1>
      <p class="page-subtitle">Manage your profile and settings.</p>

      <!-- Account info card -->
      <div class="card" style="max-width:560px; margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem;">Profile</h3>

        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="account-email">—</span>
        </div>

        <div class="info-row">
          <span class="info-label">Account ID</span>
          <span class="info-value" id="account-uid" style="font-family:monospace;font-size:0.8rem;">—</span>
        </div>

        <div class="info-row">
          <span class="info-label">Email verified</span>
          <span class="info-value" id="account-verified">—</span>
        </div>

        <div class="info-row">
          <span class="info-label">Member since</span>
          <span class="info-value" id="account-created">—</span>
        </div>
      </div>

      <!-- Placeholder sections -->
      <div class="card" style="max-width:560px; margin-bottom:1.5rem; opacity:0.65;">
        <h3 style="margin-bottom:0.5rem;">Password</h3>
        <p style="font-size:0.875rem; margin-bottom:1rem;">
          Change your account password.
        </p>
        <button class="btn btn-secondary" style="width:auto;" disabled>
          Change Password — Coming Soon
        </button>
      </div>

      <div class="card" style="max-width:560px; margin-bottom:1.5rem; opacity:0.65;">
        <h3 style="margin-bottom:0.5rem;">Billing</h3>
        <p style="font-size:0.875rem; margin-bottom:1rem;">
          Manage your subscription and payment methods.
        </p>
        <button class="btn btn-secondary" style="width:auto;" disabled>
          Manage Billing — Coming Soon
        </button>
      </div>

      <!-- Danger zone -->
      <div class="card" style="max-width:560px; border-color:#fbc4c4;">
        <h3 style="margin-bottom:0.5rem; color:#c1121f;">Sign Out</h3>
        <p style="font-size:0.875rem; margin-bottom:1rem;">
          Sign out of your account on this device.
        </p>
        <button id="logout-btn" class="btn btn-danger" style="width:auto;">
          Sign Out
        </button>
      </div>

    </main>
  </div>

  <script type="module">
    import { initShell } from "./js/app-shell.js";

    console.log("[account.html] Initializing protected page…");

    const user = await initShell();

    console.log("[account.html] Populating account data for:", user.email);

    // ── Populate profile fields ───────────────────────────────
    const emailEl    = document.getElementById("account-email");
    const uidEl      = document.getElementById("account-uid");
    const verifiedEl = document.getElementById("account-verified");
    const createdEl  = document.getElementById("account-created");

    if (emailEl)    emailEl.textContent    = user.email;
    if (uidEl)      uidEl.textContent      = user.uid;
    if (verifiedEl) verifiedEl.textContent = user.emailVerified ? "Yes ✓" : "No";

    if (createdEl && user.metadata?.creationTime) {
      const date = new Date(user.metadata.creationTime);
      createdEl.textContent = date.toLocaleDateString(undefined, {
        year: "numeric",
        month: "long",
        day: "numeric",
      });
    }
  </script>

</body>
</html>
